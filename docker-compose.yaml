services:
  mariadb:
    image: mariadb:12
    container_name: ezreport_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ezreport
      MYSQL_USER: ezuser
      MYSQL_PASSWORD: ezpassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  php:
    build: .
    container_name: ezreport_php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mariadb
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ezreport
      MYSQL_USER: ezuser
      MYSQL_PASSWORD: ezpassword

volumes:
  mariadb_data: